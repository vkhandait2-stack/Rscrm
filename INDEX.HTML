<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RS UNIISEX Salon CRM</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui;}

body{
background: radial-gradient(circle at top,#1e293b,#020617);
color:white;
}

.header{
padding:15px;
text-align:center;
background:#020617;
}
.header h1{color:#22c55e;font-size:22px;}
.header p{font-size:12px;color:#94a3b8;}

.card{
background:#1e293b;
margin:12px;
padding:15px;
border-radius:15px;
}

.dashboard{display:flex;gap:10px;}
.box{
flex:1;
background:#020617;
padding:12px;
border-radius:12px;
text-align:center;
}
.box span{
font-size:20px;
color:#22c55e;
font-weight:bold;
}

input,select{
width:100%;
padding:14px;
margin:8px 0;
border-radius:12px;
border:none;
background:#020617;
color:white;
}

button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:12px;
background:linear-gradient(45deg,#22c55e,#4ade80);
font-weight:bold;
}

.small-btn{
background:#0ea5e9;
margin-top:8px;
}
</style>

</head>

<body>

<div class="header">
<h1>RS SALON</h1>
<p>Unisex Luxury Salon </p>
</div>

<div class="card dashboard">
<div class="box">
<p>Today Entry</p>
<span id="today">0</span>
</div>

<div class="box">
<p>Total Customers</p>
<span id="total">0</span>
</div>
</div>

<div class="card">

<input id="search" placeholder="Enter Mobile Number to Search" oninput="searchCustomer(this.value)">

<input id="name" placeholder="Customer Name">
<input id="mobile" placeholder="Mobile Number">
<input id="service" placeholder="Service">
<input id="amount" type="number" placeholder="Amount">

<select id="payment">
<option>Cash</option>
<option>UPI</option>
</select>

<button onclick="saveData()">Save Entry</button>

<button class="small-btn" onclick="showHistory()">Last 10 Records</button>

<button class="small-btn" style="background:#ef4444;" onclick="resetData()">
🗑 Reset Data
</button>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbynUc9AZCycxxzyQCusIRya9zN2J70HWsUdmeQGwnUESfQBh8VZha5C8rYjAuJQd8w/exec";

let data = JSON.parse(localStorage.getItem("crm")) || [];

/* SAVE */
function saveData(){

let name=document.getElementById("name").value;
let mobile=document.getElementById("mobile").value;
let service=document.getElementById("service").value;
let amount=document.getElementById("amount").value;
let payment=document.getElementById("payment").value;

if(!name||!mobile||!amount){
alert("Fill all details");
return;
}

let visit=localStorage.getItem(mobile)||0;
visit++;
localStorage.setItem(mobile,visit);

let entry={name,mobile,service,amount,payment,visit,date:new Date()};

data.push(entry);
localStorage.setItem("crm",JSON.stringify(data));

fetch(API_URL,{
method:"POST",
body:JSON.stringify(entry)
});

updateDashboard();

if(visit>1){
alert("🔥 Repeat Customer");
}

sendWhatsApp(mobile,name);

alert("Saved Successfully");
}

/* DASHBOARD */
function updateDashboard(){
document.getElementById("total").innerText=data.length;

let todayDate=new Date().toDateString();

let todayCount=data.filter(d=>new Date(d.date).toDateString()===todayDate).length;

document.getElementById("today").innerText=todayCount;
}

/* 🔍 SEARCH FULL DETAILS */
function searchCustomer(num){

if(num.length < 5) return;

let found = [...data].reverse().find(d => d.mobile == num);

if(found){
document.getElementById("name").value = found.name;
document.getElementById("mobile").value = found.mobile;
document.getElementById("service").value = found.service;
document.getElementById("amount").value = found.amount;
document.getElementById("payment").value = found.payment;
}
}

/* HISTORY */
function showHistory(){
let text="";
data.slice(-10).reverse().forEach(d=>{
text+=`${d.name} - ₹${d.amount} - ${d.service}\n`;
});
alert(text||"No Data");
}

/* RESET DATA */
function resetData(){

let confirmReset = confirm("⚠️ Sab data delete ho jayega, pakka?");

if(confirmReset){
localStorage.removeItem("crm");
localStorage.clear();
data = [];
updateDashboard();
alert("✅ Data Reset Ho Gaya");
}
}

/* WHATSAPP */
function sendWhatsApp(number,name){
let msg=`Namaste ${name}, Thank you for visiting RS UNIISEX Salon ✂️`;
window.open(`https://wa.me/91${number}?text=${encodeURIComponent(msg)}`);
}

updateDashboard();

</script>

</body>
</html>
